<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Optimist-vädret</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #e8f4fd;
    --snow: #f7fbff;
    --ink: #0d1b2a;
    --ink2: #3a5068;
    --ink3: #7a9ab8;
    --blue: #1a6fad;
    --blue-light: #d4eaf8;
    --green: #0f7a56;
    --green-light: #d4f0e6;
    --amber: #b05f00;
    --amber-light: #fdecd4;
    --purple: #5c35a8;
    --purple-light: #ebe4fa;
    --accent: #0055cc;
    --border: rgba(13,27,42,0.1);
    --radius: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--snow);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    padding: 3rem 2rem 2rem;
    max-width: 720px;
    margin: 0 auto;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .logo em {
    font-style: italic;
    color: var(--accent);
  }

  .tagline {
    font-size: 0.95rem;
    color: var(--ink3);
    font-weight: 300;
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  .search-block {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  input[type="text"] {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    padding: 0.85rem 1.1rem;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--ink3); }

  button.search-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0.85rem 1.5rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  button.search-btn:hover { opacity: 0.88; }
  button.search-btn:active { transform: scale(0.97); }
  button.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .modes {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .mode-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }

  .mode-btn.active[data-mode="snow"] { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
  .mode-btn.active[data-mode="sun"]  { background: var(--amber-light); color: var(--amber); border-color: var(--amber); }
  .mode-btn.active[data-mode="rain"] { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }
  .mode-btn.active[data-mode="wind"] { background: var(--green-light); color: var(--green); border-color: var(--green); }

  #result { display: none; animation: fadeUp 0.35s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .location-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
    margin-bottom: 0.2rem;
  }

  .location-sub {
    font-size: 0.85rem;
    color: var(--ink3);
    margin-bottom: 1.75rem;
  }

  .sources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .source-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    transition: border-color 0.15s;
  }

  .source-card.winner {
    border-width: 2px;
  }

  .source-card.winner[data-mode="snow"] { border-color: var(--blue); background: var(--blue-light); }
  .source-card.winner[data-mode="sun"]  { border-color: var(--amber); background: var(--amber-light); }
  .source-card.winner[data-mode="rain"] { border-color: var(--purple); background: var(--purple-light); }
  .source-card.winner[data-mode="wind"] { border-color: var(--green); background: var(--green-light); }

  .source-name {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink3);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .source-card.winner .source-name { color: var(--ink2); }

  .source-value {
    font-size: 1.7rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1;
  }

  .source-unit {
    font-size: 0.8rem;
    color: var(--ink3);
    margin-top: 3px;
  }

  .winner-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 999px;
    margin-top: 8px;
    letter-spacing: 0.03em;
  }

  .winner[data-mode="snow"] .winner-badge { background: var(--blue); color: white; }
  .winner[data-mode="sun"]  .winner-badge { background: var(--amber); color: white; }
  .winner[data-mode="rain"] .winner-badge { background: var(--purple); color: white; }
  .winner[data-mode="wind"] .winner-badge { background: var(--green); color: white; }

  .verdict {
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: 0.25rem;
  }

  .verdict[data-mode="snow"] { background: var(--blue-light); }
  .verdict[data-mode="sun"]  { background: var(--amber-light); }
  .verdict[data-mode="rain"] { background: var(--purple-light); }
  .verdict[data-mode="wind"] { background: var(--green-light); }

  .verdict-eyebrow {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .verdict[data-mode="snow"] .verdict-eyebrow { color: var(--blue); }
  .verdict[data-mode="sun"]  .verdict-eyebrow { color: var(--amber); }
  .verdict[data-mode="rain"] .verdict-eyebrow { color: var(--purple); }
  .verdict[data-mode="wind"] .verdict-eyebrow { color: var(--green); }

  .verdict-headline {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 0.4rem;
  }

  .verdict-detail {
    font-size: 0.875rem;
    color: var(--ink2);
    font-weight: 300;
  }

  .error-msg {
    background: #fff3f3;
    border: 1.5px solid #f9c0c0;
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    color: #9c2a2a;
    font-size: 0.9rem;
    margin-top: 1rem;
    display: none;
  }

  .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .other-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 8px;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .stat-item { text-align: center; }
  .stat-val { font-size: 1.2rem; font-weight: 300; color: var(--ink); }
  .stat-lbl { font-size: 0.75rem; color: var(--ink3); margin-top: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Optimist<em>-vädret</em></div>
  <div class="tagline">Hittar alltid det bästa väderlöftet för din resa – bland flera oberoende källor.</div>
</header>

<main>
  <div class="search-block">
    <input type="text" id="place" placeholder="Ort, t.ex. Åre, Chamonix, Innsbruck..." autocomplete="off" />
    <button class="search-btn" onclick="search()" id="search-btn">
      <span id="btn-label">Sök</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="snow" onclick="setMode('snow', this)">Snöfall</button>
    <button class="mode-btn" data-mode="sun"  onclick="setMode('sun', this)">Sol & värme</button>
    <button class="mode-btn" data-mode="rain" onclick="setMode('rain', this)">Regn</button>
    <button class="mode-btn" data-mode="wind" onclick="setMode('wind', this)">Vind</button>
  </div>

  <div class="error-msg" id="error"></div>
  <div id="result"></div>
</main>

<script>
let currentMode = 'snow';
let lastPlace = '';
let lastData = null;

const modeConfig = {
  snow: { key: 'snow', unit: 'cm', label: 'snöfall', verb: 'lovar', headline: (s,v) => `${s} lovar ${v} cm nysnö den kommande veckan`, eyebrow: 'Optimistisk snöprognos', detail: 'Källa med mest snöfall vald' },
  sun:  { key: 'sun',  unit: 'h',  label: 'soltimmar', verb: 'räknar med', headline: (s,v) => `${s} räknar med ${v} soltimmar de närmaste 7 dagarna`, eyebrow: 'Mest sol enligt källorna', detail: 'Källa med flest soltimmar vald' },
  rain: { key: 'rain', unit: 'mm', label: 'nederbörd', verb: 'spår', headline: (s,v) => `${s} spår ${v} mm regn – perfekt för dig som älskar regnväder`, eyebrow: 'Mest regn enligt källorna', detail: 'Källa med mest nederbörd vald' },
  wind: { key: 'wind', unit: 'm/s', label: 'max vind', verb: 'förutspår', headline: (s,v) => `${s} förutspår vindbyar på ${v} m/s – perfekt för äventyr`, eyebrow: 'Starkast vind enligt källorna', detail: 'Källa med högst vindhastighet vald' },
};

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (lastData) renderResult(lastData);
}

async function search() {
  const place = document.getElementById('place').value.trim();
  if (!place) return;
  lastPlace = place;
  setLoading(true);
  hideError();

  try {
    const res = await fetch(`/api/weather?place=${encodeURIComponent(place)}&mode=${currentMode}`);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    lastData = data;
    renderResult(data);
  } catch {
    showError('Något gick fel. Kontrollera din anslutning och försök igen.');
  } finally {
    setLoading(false);
  }
}

function renderResult(data) {
  const m = modeConfig[currentMode];
  const winner = data.sources.reduce((a, b) => b[m.key] > a[m.key] ? b : a, data.sources[0]);
  const el = document.getElementById('result');

  el.innerHTML = `
    <div class="location-title">${data.location.name}, ${data.location.country}</div>
    <div class="location-sub">Prognos 7 dagar framåt · ${data.sources.length} källor jämförda</div>

    <div class="sources-grid">
      ${data.sources.map(s => {
        const isWinner = s.source === winner.source;
        return `
          <div class="source-card ${isWinner ? 'winner' : ''}" ${isWinner ? `data-mode="${currentMode}"` : ''}>
            <div class="source-name">${s.source}</div>
            <div class="source-value">${s[m.key]}</div>
            <div class="source-unit">${m.unit} ${m.label}</div>
            ${isWinner ? `<div class="winner-badge">Bäst matchning</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>

    <div class="verdict" data-mode="${currentMode}">
      <div class="verdict-eyebrow">${m.eyebrow}</div>
      <div class="verdict-headline">${m.headline(winner.source, winner[m.key])}</div>
      <div class="verdict-detail">${m.detail} · Väderdata uppdateras var 30:e minut</div>

      <div class="other-stats">
        <div class="stat-item"><div class="stat-val">${winner.maxTemp}°C</div><div class="stat-lbl">Max temp</div></div>
        <div class="stat-item"><div class="stat-val">${winner.snow} cm</div><div class="stat-lbl">Snö</div></div>
        <div class="stat-item"><div class="stat-val">${winner.sun} h</div><div class="stat-lbl">Sol</div></div>
        <div class="stat-item"><div class="stat-val">${winner.wind} m/s</div><div class="stat-lbl">Max vind</div></div>
        <div class="stat-item"><div class="stat-val">${winner.rain} mm</div><div class="stat-lbl">Regn</div></div>
      </div>
    </div>
  `;

  el.style.display = 'block';
}

function setLoading(on) {
  document.getElementById('search-btn').disabled = on;
  document.getElementById('btn-label').style.display = on ? 'none' : 'inline';
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error').style.display = 'none';
}

document.getElementById('place').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
