  }

  header {
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.5);
    padding: 2.25rem 2rem 1.5rem;
  }

  .header-inner { max-width: 760px; margin: 0 auto; }

  .logo {
    font-size: 2.3rem;
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 0.3rem;
    color: var(--blue);
  }
  .logo span { color: var(--blue); }
  .tagline { font-size: 1.05rem; color: var(--blue); font-weight: 500; margin-top: 0.5rem; }

  .app-wrap { max-width: 760px; margin: 2rem auto; padding: 0 1.5rem 3rem; }

  .app-card {
    background: rgba(255,255,255,0.86);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: 0 6px 40px rgba(13,27,42,0.1);
    padding: 1.75rem;
  }

  .search-block { display: flex; gap: 10px; margin-bottom: 1.2rem; }

  input[type="text"] {
    flex: 1; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px;
    padding: 0.85rem 1.1rem; border: 1.5px solid var(--border);
    border-radius: 12px; background: white; color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--blue); }
  input[type="text"]::placeholder { color: var(--ink3); }

  button.search-btn {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    padding: 0.85rem 1.6rem; background: #4a9e6b; color: white;
    border: none; border-radius: 12px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap; min-width: 84px;
    display: flex; align-items: center; justify-content: center;
  }
  button.search-btn:hover { opacity: 0.88; }
  button.search-btn:active { transform: scale(0.97); }
  button.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .controls-row {
    display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }

  .modes { display: flex; gap: 8px; }

  .mode-btn {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.83rem; font-weight: 500;
    padding: 7px 18px; border-radius: 999px; border: 1.5px solid var(--border);
    background: white; color: var(--ink2); cursor: pointer; transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--blue); color: var(--blue); }
  .mode-btn.active[data-mode="snow"] { background: var(--blue); color: white; border-color: var(--blue); }
  .mode-btn.active[data-mode="sun"]  { background: #e8a800; color: white; border-color: #e8a800; }

  .checkbox-label {
    display: flex; align-items: center; gap: 8px; font-size: 0.83rem;
    color: var(--ink2); cursor: pointer; user-select: none; white-space: nowrap;
  }
  .checkbox-label input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }

  #result { display: none; margin-top: 1.6rem; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .location-title { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.15rem; }
  .location-sub { font-size: 0.79rem; color: var(--ink3); font-weight: 300; margin-bottom: 1.4rem; }

  .verdict {
    border-radius: var(--radius); padding: 1.2rem 1.4rem;
    margin-bottom: 1rem; border: 1.5px solid transparent;
    position: relative;
  }
  .verdict[data-mode="snow"] { background: var(--blue-light); border-color: var(--blue-mid); }
  .verdict[data-mode="sun"]  { background: #fff8d6; border-color: #e8c000; }

  .verdict-eyebrow {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 0.3rem;
  }
  .verdict[data-mode="snow"] .verdict-eyebrow { color: var(--blue); }
  .verdict[data-mode="sun"]  .verdict-eyebrow { color: #b07800; }

  .verdict-headline { font-size: 1.12rem; font-weight: 500; color: var(--ink); line-height: 1.35; margin-bottom: 0.3rem; }
  .verdict-detail { font-size: 0.77rem; color: var(--ink2); font-weight: 300; }

  .other-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 6px; margin-top: 1.1rem; padding-top: 1.1rem;
    border-top: 1px solid rgba(13,27,42,0.07);
  }
  .stat-item { text-align: center; }
  .stat-val { font-size: 1.05rem; font-weight: 300; color: var(--ink); }
  .stat-lbl { font-size: 0.68rem; color: var(--ink3); margin-top: 1px; }

  .sources-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px;
  }

  .source-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 0.9rem 1rem; }
  .source-card.winner { border-width: 2px; }
  .source-card.winner[data-mode="snow"] { border-color: var(--blue); background: rgba(208,232,248,0.45); }
  .source-card.winner[data-mode="sun"]  { border-color: #e8a800; background: rgba(255,248,214,0.5); }

  .source-name { font-size: 0.68rem; font-weight: 500; color: var(--ink3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .source-card.winner .source-name { color: var(--ink2); }
  .source-value { font-size: 1.55rem; font-weight: 300; color: var(--ink); line-height: 1; }
  .source-unit { font-size: 0.72rem; color: var(--ink3); margin-top: 2px; }

  .winner-badge {
    display: inline-block; font-size: 0.63rem; font-weight: 600;
    padding: 2px 8px; border-radius: 999px; margin-top: 6px;
  }
  .winner[data-mode="snow"] .winner-badge { background: var(--blue); color: white; }
  .winner[data-mode="sun"]  .winner-badge { background: #e8a800; color: white; }

  .starburst-wrap {
    position: absolute;
    top: -15px;
    right: -15px;
    display: inline-block;
    filter: drop-shadow(2px 3px 8px rgba(13,27,42,0.25));
    z-index: 10;
  }
  .starburst-wrap svg { overflow: visible; width: 130px; height: 115px; }
  .starburst-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; }
  .starburst-text .wax-color { font-weight: 700; }
  .starburst-text .wax-color.purple { fill: #7b35c1; }
  .starburst-text .wax-color.red    { fill: #e02020; }
  .starburst-text .wax-color.yellow { fill: #c89000; }
  .skiwax-bubble .wax-color { font-weight: 700; }
  .skiwax-bubble .wax-color.purple { color: #7b35c1; }
  .skiwax-bubble .wax-color.red    { color: #e02020; }
  .skiwax-bubble .wax-color.yellow { color: #c89000; }
  .spf-value.spf-low      { fill: #3aaa55; }
  .spf-value.spf-moderate { fill: #e8a800; }
  .spf-value.spf-high     { fill: #e06000; }
  .spf-value.spf-veryhigh { fill: #d02000; }
  .spf-value.spf-extreme  { fill: #9b00c8; }

/* spf bubble handled by starburst SVG */

  .error-msg {
    background: var(--red-light); border: 1.5px solid var(--red-mid);
    border-radius: 12px; padding: 0.9rem 1.1rem; color: var(--red);
    font-size: 0.88rem; margin-top: 1rem; display: none;
  }

  .spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header { padding: 1.2rem 1.2rem 1rem; }
    .logo { font-size: 1.6rem; }
    .tagline { font-size: 0.82rem; margin-top: 0.25rem; }
    .app-wrap { margin: 0.75rem auto; padding: 0 0.9rem 1.5rem; }
    .app-card { padding: 1.1rem; border-radius: 16px; }
    .search-block { gap: 8px; margin-bottom: 0.9rem; }
    input[type="text"] { font-size: 0.9rem; padding: 0.7rem 0.85rem; }
    button.search-btn { padding: 0.7rem 1.1rem; font-size: 0.88rem; min-width: 70px; }
    .mode-btn { font-size: 0.78rem; padding: 6px 13px; }
    .checkbox-label { font-size: 0.78rem; }
    #result { margin-top: 1rem; }
    .location-title { font-size: 1.1rem; }
    .location-sub { font-size: 0.72rem; margin-bottom: 0.9rem; }
    .verdict { padding: 0.9rem 1rem; margin-bottom: 0.75rem; }
    .verdict-headline { font-size: 0.95rem; }
    .verdict-detail { font-size: 0.72rem; }
    .other-stats { gap: 4px; margin-top: 0.8rem; padding-top: 0.8rem; grid-template-columns: repeat(5, 1fr); }
    .stat-val { font-size: 0.88rem; }
    .stat-lbl { font-size: 0.6rem; }
  }


  .wave-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    display: none;
    overflow: hidden;
  }
  body.bg-sun .wave-overlay { display: block; }
  .wave-svg { position: fixed; left: -100px; width: calc(100% + 200px); }
  .wave-svg.w1 { top: 52vh; }
  .wave-svg.w2 { top: 56vh; }
  .wave-svg.w3 { top: 60vh; }
  .wave-svg.w4 { top: 63vh; }
  .wave-svg.w5 { top: 66vh; }
  .wl1 { animation: wbob1 4s ease-in-out infinite; }
  .wl2 { animation: wbob2 5.2s ease-in-out infinite; }
  .wl3 { animation: wbob3 3.8s ease-in-out infinite; }
  .wl4 { animation: wbob4 6s ease-in-out infinite; }
  .wl5 { animation: wbob5 4.6s ease-in-out infinite; }
  @keyframes wbob1 { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(-8px) translateX(18px)} }
  @keyframes wbob2 { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(6px) translateX(-22px)} }
  @keyframes wbob3 { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(-5px) translateX(14px)} }
  @keyframes wbob4 { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(7px) translateX(-16px)} }
  @keyframes wbob5 { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(-4px) translateX(10px)} }





  .snowflake {
    position: fixed;
    top: -10px;
    border-radius: 50%;
    background: white;
    opacity: 0;
    animation: snowfall linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes snowfall {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.6; }
    100% { transform: translateY(110vh) translateX(var(--drift, 40px)); opacity: 0; }
  }
  .app-card, header { position: relative; z-index: 1; }

</style>
</head>
<body class="bg-snow">

<header>
  <div class="header-inner">
    <div class="logo">The day of <span>my life!</span></div>
    <div class="tagline">Always finds the most optimistic weather forecast for your destination.</div>
  </div>
</header>

<div class="app-wrap">
  <div class="app-card">
    <div class="search-block">
      <input type="text" id="place" placeholder="Destination, e.g. Åre, Chamonix, Zermatt..." autocomplete="off" />
      <button class="search-btn" onclick="doSearch()" id="search-btn">
        <span id="btn-label">Search</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>

    <div class="controls-row">
      <div class="modes">
        <button class="mode-btn active" data-mode="snow" onclick="setMode('snow', this)">Powder!</button>
        <button class="mode-btn" data-mode="sun" onclick="setMode('sun', this)">Sunshine!</button>
      </div>
      <label class="checkbox-label">
        <input type="checkbox" id="seven-days" onchange="onRangeChange()" />
        7 days ahead
      </label>
    </div>

    <div class="error-msg" id="error"></div>
    <div id="result"></div>
  </div>
</div>

<script>
let currentMode = 'snow';
let lastData = null;

const modeConfig = {
  snow: { key: 'snow', unit: 'cm', label: 'snowfall', eyebrow: 'Best snow forecast', detail: 'Source with most snowfall selected', headline: (s,v,d) => `${s} promises ${v} cm of fresh snow ${d===1?'today':'over the coming week'}` },
  sun:  { key: 'sun',  unit: 'h',  label: 'sun hours', eyebrow: 'Most sunshine across sources', detail: 'Source with most sunshine hours selected', headline: (s,v,d) => `${s} forecasts ${v} hours of sunshine ${d===1?'today':'over the next 7 days'}` },
};

function getDays() { return document.getElementById('seven-days').checked ? 7 : 1; }

const placeholders = {
  snow: 'Destination, e.g. Åre, Chamonix, Zermatt...',
  sun:  'Destination, e.g. Tucepi, Marbella, Santorini...'
};

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.body.className = mode === 'snow' ? 'bg-snow' : 'bg-sun';
  document.getElementById('place').placeholder = placeholders[mode];
  if (mode !== 'snow') {
    document.querySelectorAll('.snowflake').forEach(f => f.remove());
    document.querySelectorAll('.starburst-wrap').forEach(s => s.remove());
  }
  if (lastData) doSearch();
}

function onRangeChange() {
  const place = document.getElementById('place').value.trim();
  if (place) doSearch();
}

async function doSearch() {
  const place = document.getElementById('place').value.trim();
  if (!place) return;
  lastData = null;
  setLoading(true);
  hideError();
  try {
    const days = getDays();
    const ts = Date.now();
    const res = await fetch(`/api/weather?place=${encodeURIComponent(place)}&mode=${currentMode}&days=${days}&t=${ts}`, { cache: 'no-store' });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    lastData = data;
    renderResult(data, days);
  } catch {
    showError('Something went wrong. Please check your connection and try again.');
  } finally {
    setLoading(false);
  }
}

function renderResult(data, days) {
  if (days === undefined) days = data.days || 1;
  const m = modeConfig[currentMode];
  const winner = data.winner;
  const el = document.getElementById('result');
  const sourcesCount = data.sourcesCount || 1;

  el.innerHTML = `
    <div class="location-title">${data.location.name}, ${data.location.country}</div>
    <div class="location-sub">${days === 1 ? "Today's forecast" : '7-day forecast'} · ${sourcesCount} sources compared</div>

    <div class="verdict" data-mode="${currentMode}">
      <div class="verdict-eyebrow">${m.eyebrow}</div>
      <div class="verdict-headline">${m.headline(winner.source, winner[m.key], days)}</div>
      <div class="verdict-detail">${m.detail}</div>
      <div class="other-stats">
        <div class="stat-item"><div class="stat-val">${winner.maxTemp}°C</div><div class="stat-lbl">Max temp</div></div>
        ${currentMode === 'sun'
          ? `<div class="stat-item"><div class="stat-val">${winner.uv ?? '–'}</div><div class="stat-lbl">UV index</div></div>`
          : `<div class="stat-item"><div class="stat-val">${winner.snow} cm</div><div class="stat-lbl">Snow</div></div>`}
        <div class="stat-item"><div class="stat-val">${winner.sun} h</div><div class="stat-lbl">Sun</div></div>
        <div class="stat-item"><div class="stat-val">${winner.wind} m/s</div><div class="stat-lbl">Max wind</div></div>
        <div class="stat-item"><div class="stat-val">${winner.rain} mm</div><div class="stat-lbl">Rain</div></div>
      </div>
    </div>
  `;

  // SPF bubble (Sunshine mode only)
  if (currentMode === 'sun') {
    const uv = winner.uv ?? null;
    let spfClass, spfText;
    if (uv === null) {
      spfText = null;
    } else if (uv <= 2) {
      spfClass = 'spf-low';      spfText = 'SPF 15';
    } else if (uv <= 5) {
      spfClass = 'spf-moderate'; spfText = 'SPF 30';
    } else if (uv <= 7) {
      spfClass = 'spf-high';     spfText = 'SPF 30–50';
    } else if (uv <= 10) {
      spfClass = 'spf-veryhigh'; spfText = 'SPF 50';
    } else {
      spfClass = 'spf-extreme';  spfText = 'SPF 50+';
    }
    if (spfText && days === 1) {
      const spfWrap = document.createElement('div');
      spfWrap.className = 'starburst-wrap';
      const spfColors = {'spf-low':'#3aaa55','spf-moderate':'#e8a800','spf-high':'#e06000','spf-veryhigh':'#d02000','spf-extreme':'#9b00c8'};
      const spfColor = spfColors[spfClass] || '#0d1b2a';
      const starPath = "M 140,10 L 155,40 L 188,28 L 178,60 L 212,65 L 192,90 L 220,108 L 196,128 L 212,155 L 182,158 L 178,192 L 152,175 L 140,205 L 128,175 L 102,192 L 98,158 L 68,155 L 84,128 L 60,108 L 88,90 L 68,65 L 102,60 L 92,28 L 125,40 Z";
      spfWrap.innerHTML = `<svg viewBox="0 0 130 115" xmlns="http://www.w3.org/2000/svg">
        <!-- sign board with pointed bottom -->
        <path d="M4,4 L126,4 L126,96 L65,112 L4,96 Z" fill="#fdf6e3" stroke="#b8864e" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- double border inside -->
        <path d="M10,10 L120,10 L120,90 L65,104 L10,90 Z" fill="none" stroke="#b8864e" stroke-width="1" opacity="0.4"/>
        <text text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="14" fill="#0d1b2a">
          <tspan x="65" dy="26" font-weight="700">Stay safe,</tspan>
          <tspan x="65" dy="19" font-weight="700">use</tspan>
          <tspan x="65" dy="19" font-weight="700" fill="${spfColor}">${spfText}</tspan>
          <tspan x="65" dy="19" font-weight="700">sun screen!</tspan>
        </text>
      </svg>`;
      el.querySelector('.verdict').appendChild(spfWrap);
    }
  }

  // Ski wax bubble (Powder mode only)
  if (currentMode === 'snow') {
    const temp = winner.maxTemp;
    let waxClass, waxName;
    if (temp <= -4) {
      waxClass = 'purple'; waxName = 'purple';
    } else if (temp <= 4) {
      waxClass = 'red'; waxName = 'red';
    } else {
      waxClass = 'yellow'; waxName = 'yellow';
    }
    if (days === 1) {
    const wrap = document.createElement('div');
    wrap.className = 'starburst-wrap';
    // starburst path: 12-point star
    const star = "M 140,10 L 155,40 L 188,28 L 178,60 L 212,65 L 192,90 L 220,108 L 196,128 L 212,155 L 182,158 L 178,192 L 152,175 L 140,205 L 128,175 L 102,192 L 98,158 L 68,155 L 84,128 L 60,108 L 88,90 L 68,65 L 102,60 L 92,28 L 125,40 Z";
    wrap.innerHTML = `<svg viewBox="0 0 130 115" xmlns="http://www.w3.org/2000/svg">
      <!-- sign board with pointed bottom -->
      <path d="M4,4 L126,4 L126,96 L65,112 L4,96 Z" fill="#9dc8e8" stroke="#1a5fa8" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- double border inside -->
      <path d="M10,10 L120,10 L120,90 L65,104 L10,90 Z" fill="none" stroke="#1a5fa8" stroke-width="1" opacity="0.4"/>
      <text text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="14" fill="#0d1b2a">
        <tspan x="65" y="36" font-weight="700">Speed is your</tspan>
        <tspan x="65" dy="19" font-weight="700">friend, use</tspan>
        <tspan x="65" dy="19"><tspan font-weight="700" fill="${waxClass === 'purple' ? '#7b35c1' : waxClass === 'red' ? '#e02020' : '#c89000'}">${waxName} wax</tspan><tspan font-weight="700" fill="#0d1b2a">!</tspan></tspan>
      </text>
    </svg>`;
    el.querySelector('.verdict').appendChild(wrap);
    } // end days===1
  }

  el.style.display = 'block';
}

function setLoading(on) {
  document.getElementById('search-btn').disabled = on;
  document.getElementById('btn-label').style.display = on ? 'none' : 'inline';
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}
function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }
function hideError() { document.getElementById('error').style.display = 'none'; }
document.getElementById('place').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function createSnow() {
  if (!document.body.classList.contains('bg-snow')) return;
  const flake = document.createElement('div');
  flake.className = 'snowflake';
  const size = Math.random() * 5 + 2;
  const duration = Math.random() * 6 + 5;
  const delay = Math.random() * 4;
  const left = Math.random() * 100;
  const drift = (Math.random() - 0.5) * 120;
  flake.style.cssText = `width:${size}px;height:${size}px;left:${left}vw;animation-duration:${duration}s;animation-delay:${delay}s;`;
  flake.style.setProperty('--drift', drift + 'px');
  document.body.appendChild(flake);
  setTimeout(() => flake.remove(), (duration + delay) * 1000);
}
setInterval(createSnow, 180);

</script>

<div class="wave-overlay">
  <svg class="wave-svg w1" viewBox="0 0 1600 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="20">
    <path class="wl1" d="M0,10 Q200,2 400,10 Q600,18 800,10 Q1000,2 1200,10 Q1400,18 1600,10" stroke="white" stroke-width="2.5" fill="none" opacity="0.55"/>
  </svg>
  <svg class="wave-svg w2" viewBox="0 0 1600 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="20">
    <path class="wl2" d="M0,10 Q220,2 440,10 Q660,18 880,10 Q1100,2 1320,10 Q1500,18 1600,10" stroke="white" stroke-width="2" fill="none" opacity="0.42"/>
  </svg>
  <svg class="wave-svg w3" viewBox="0 0 1600 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="20">
    <path class="wl3" d="M0,10 Q180,3 360,10 Q540,17 720,10 Q900,3 1080,10 Q1260,17 1440,10 Q1540,15 1600,10" stroke="white" stroke-width="1.8" fill="none" opacity="0.35"/>
  </svg>
  <svg class="wave-svg w4" viewBox="0 0 1600 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="20">
    <path class="wl4" d="M0,10 Q240,3 480,10 Q720,17 960,10 Q1200,3 1440,10 Q1550,15 1600,10" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  </svg>
  <svg class="wave-svg w5" viewBox="0 0 1600 20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="20">
    <path class="wl5" d="M0,10 Q200,4 400,10 Q600,16 800,10 Q1000,4 1200,10 Q1400,16 1600,10" stroke="white" stroke-width="1" fill="none" opacity="0.22"/>
  </svg>
</div>
