<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" id="theme-color-meta" content="#1a4a24" />
<title>BestWeather</title>
<meta name="apple-mobile-web-app-title" content="BestWeather"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="BestWeather"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link id="apple-touch-icon" rel="apple-touch-icon" sizes="180x180" />
<link id="favicon" rel="icon" type="image/png" sizes="32x32" />
<script>
(function(){
  const sz = 180, r = 40;
  const c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');

  // Rounded clip
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(sz-r,0); ctx.quadraticCurveTo(sz,0,sz,r);
  ctx.lineTo(sz,sz-r); ctx.quadraticCurveTo(sz,sz,sz-r,sz);
  ctx.lineTo(r,sz); ctx.quadraticCurveTo(0,sz,0,sz-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.clip();

  // Sky
  ctx.fillStyle='#3d8fc0'; ctx.fillRect(0,0,sz,sz);

  // Distant mountains
  ctx.fillStyle='rgba(90,170,212,0.45)';
  ctx.beginPath();
  ctx.moveTo(0,170); ctx.lineTo(20,128); ctx.lineTo(36,142); ctx.lineTo(54,108);
  ctx.lineTo(72,133); ctx.lineTo(90,105); ctx.lineTo(108,126); ctx.lineTo(126,110);
  ctx.lineTo(144,128); ctx.lineTo(162,112); ctx.lineTo(180,130); ctx.lineTo(180,170);
  ctx.closePath(); ctx.fill();

  // Near peaks
  ctx.fillStyle='#daeef8';
  ctx.beginPath();
  ctx.moveTo(0,180);
  ctx.lineTo(10,148); ctx.lineTo(20,162); ctx.lineTo(30,128); ctx.lineTo(42,154);
  ctx.lineTo(54,112); ctx.lineTo(65,148); ctx.lineTo(78,96); ctx.lineTo(90,140);
  ctx.lineTo(102,116); ctx.lineTo(114,148); ctx.lineTo(126,122); ctx.lineTo(138,148);
  ctx.lineTo(150,126); ctx.lineTo(162,150); ctx.lineTo(174,130); ctx.lineTo(180,145);
  ctx.lineTo(180,180);
  ctx.closePath(); ctx.fill();

  // Ground
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillRect(0,168,180,12);

  // Sun
  ctx.save(); ctx.translate(142,38);
  ctx.strokeStyle='#ffd000'; ctx.lineWidth=2; ctx.lineCap='round';
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*16,Math.sin(a)*16); ctx.lineTo(Math.cos(a)*23,Math.sin(a)*23); ctx.stroke();
  }
  ctx.fillStyle='#ffe033'; ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff5a0'; ctx.beginPath(); ctx.arc(-2,-2,8,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Snowflake drawing function — matches reference style
  function drawFlake(cx, cy, size, alpha=1) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = 'white';
    ctx.lineCap = 'round';
    for(let i=0; i<6; i++){
      ctx.save();
      ctx.rotate(i * Math.PI/3);
      ctx.lineWidth = size * 0.09;
      // Main arm
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-size); ctx.stroke();
      // Inner branches at 35%
      const b1 = size*0.35;
      ctx.lineWidth = size * 0.07;
      ctx.beginPath(); ctx.moveTo(0,-b1); ctx.lineTo(-size*0.14,-b1-size*0.14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-b1); ctx.lineTo( size*0.14,-b1-size*0.14); ctx.stroke();
      // Outer branches at 65%
      const b2 = size*0.65;
      ctx.beginPath(); ctx.moveTo(0,-b2); ctx.lineTo(-size*0.13,-b2-size*0.13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-b2); ctx.lineTo( size*0.13,-b2-size*0.13); ctx.stroke();
      // Tip fork at 88%
      const b3 = size*0.88;
      ctx.lineWidth = size*0.06;
      ctx.beginPath(); ctx.moveTo(0,-b3); ctx.lineTo(-size*0.08,-b3-size*0.08); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-b3); ctx.lineTo( size*0.08,-b3-size*0.08); ctx.stroke();
      ctx.restore();
    }
    // Center dot
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(0,0,size*0.09,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  drawFlake(48, 112, 26);
  drawFlake(95, 76, 16, 0.9);
  drawFlake(122, 100, 11, 0.75);
  drawFlake(22, 72, 7, 0.7);
  drawFlake(155, 88, 7, 0.65);

  const url = c.toDataURL('image/png');
  document.getElementById('apple-touch-icon').href = url;
  const f = document.createElement('canvas');
  f.width = f.height = 32;
  f.getContext('2d').drawImage(c,0,0,32,32);
  document.getElementById('favicon').href = f.toDataURL('image/png');
})();
</script>

    5%   { opacity: 1; }
    95%  { opacity: 0.6; }
    100% { transform: translateY(110vh) translateX(var(--drift, 40px)); opacity: 0; }
  }
  .app-card, header { position: relative; z-index: 1; }

</style>
</head>
<body class="bg-snow">

<header>
  <div class="header-inner">
    <div class="logo">Best <span>Weather</span></div>
    <div class="tagline">For people who prefer powder, sunshine, and selective trust!</div>
  </div>
</header>

<div class="app-wrap">
  <div class="app-card">
    <div class="search-block">
      <input type="text" id="place" placeholder="Destination, e.g. Åre, Chamonix, Zermatt..." autocomplete="off" />
      <button class="loc-btn" onclick="useMyLocation()" id="loc-btn" title="Use my location">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
        </svg>
      </button>
      <button class="search-btn" onclick="doSearch()" id="search-btn">
        <span id="btn-label">Search</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>

    <div class="controls-row">
      <div class="modes">
        <button class="mode-btn active" data-mode="snow" onclick="setMode('snow', this)">Powder!</button>
        <button class="mode-btn" data-mode="sun" onclick="setMode('sun', this)">Sunshine!</button>
      </div>
      <label class="checkbox-label">
        <input type="checkbox" id="seven-days" />
        7 days ahead
      </label>
    </div>

    <div class="error-msg" id="error"></div>
    <div id="result"></div>
  </div>
</div>

<script>
let currentMode = 'snow';
let lastData = null;

// XSS helper — escapes untrusted strings before inserting into HTML
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const modeConfig = {
  snow: { key: 'snow', unit: 'cm', label: 'snowfall', eyebrow: 'Best snow forecast', detail: 'Source with most snowfall selected', headline: (s,v,d) => `${esc(s)} promises ${esc(v)} cm of fresh snow ${d===1?'today':'over the coming week'}` },
  sun:  { key: 'sun',  unit: 'h',  label: 'sun hours', eyebrow: 'Most sunshine across sources', detail: 'Source with most sunshine hours selected', headline: (s,v,d) => `${esc(s)} forecasts ${esc(v)} hours of sunshine ${d===1?'today':'over the next 7 days'}` },
};

function getDays() { return document.getElementById('seven-days').checked ? 7 : 1; }

const placeholders = {
  snow: 'Destination, e.g. Åre, Chamonix, Zermatt...',
  sun:  'Destination, e.g. Tucepi, Marbella, Santorini...'
};

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.body.className = mode === 'snow' ? 'bg-snow' : 'bg-sun';
  document.documentElement.className = mode === 'sun' ? 'mode-sun' : '';
  document.getElementById('theme-color-meta').setAttribute('content', mode === 'snow' ? '#1a4a24' : '#c8a85c');
  document.getElementById('place').placeholder = placeholders[mode];
  if (mode !== 'snow') {
    document.querySelectorAll('.snowflake').forEach(f => f.remove());
  }
  document.querySelectorAll('.verdict-tip').forEach(s => s.remove());
  if (lastData) doSearch();
}

async function doSearch() {
  const place = document.getElementById('place').value.trim();
  if (!place) return;
  lastData = null;
  setLoading(true);
  hideError();
  try {
    const days = getDays();
    const ts = Date.now();
    const res = await fetch(`/api/weather?place=${encodeURIComponent(place)}&mode=${currentMode}&days=${days}&t=${ts}`, { cache: 'no-store' });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    lastData = data;
    renderResult(data, days);
  } catch {
    showError('Something went wrong. Please check your connection and try again.');
  } finally {
    setLoading(false);
  }
}

function renderResult(data, days) {
  if (days === undefined) days = data.days || 1;
  const m = modeConfig[currentMode];
  const winner = data.winner;
  const el = document.getElementById('result');
  const sourcesCount = data.sourcesCount || 1;

  el.innerHTML = `
    <div class="location-title">${esc(data.location.name)}, ${esc(data.location.country)}</div>
    <div class="location-sub">${days === 1 ? "Today's forecast" : '7-day forecast'} · ${esc(sourcesCount)} sources compared</div>

    <div class="verdict" data-mode="${esc(currentMode)}">
      <div class="verdict-eyebrow">${m.eyebrow}</div>
      <div class="verdict-headline">${m.headline(winner.source, winner[m.key], days)}</div>
      <div class="verdict-detail">${m.detail}</div>
      <div class="other-stats">
        <div class="stat-item"><div class="stat-val">${esc(winner.maxTemp)}°C</div><div class="stat-lbl">Max temp</div></div>
        ${currentMode === 'sun'
          ? `<div class="stat-item"><div class="stat-val">${esc(winner.uv ?? '–')}</div><div class="stat-lbl">UV index</div></div>`
          : `<div class="stat-item"><div class="stat-val">${esc(winner.snow)} cm</div><div class="stat-lbl">Snow</div></div>`}
        <div class="stat-item"><div class="stat-val">${esc(winner.sun)} h</div><div class="stat-lbl">Sun</div></div>
        <div class="stat-item"><div class="stat-val">${esc(winner.wind)} m/s</div><div class="stat-lbl">Max wind</div></div>
        <div class="stat-item"><div class="stat-val">${esc(winner.rain)} mm</div><div class="stat-lbl">Rain</div></div>
      </div>
    </div>
  `;

  // SPF bubble (Sunshine mode only)
  if (currentMode === 'sun') {
    const uv = winner.uv ?? null;
    let spfClass, spfText;
    if (uv === null) {
      spfText = null;
    } else if (uv <= 2) {
      spfClass = 'spf-low';      spfText = 'SPF 15';
    } else if (uv <= 5) {
      spfClass = 'spf-moderate'; spfText = 'SPF 30';
    } else if (uv <= 7) {
      spfClass = 'spf-high';     spfText = 'SPF 30–50';
    } else if (uv <= 10) {
      spfClass = 'spf-veryhigh'; spfText = 'SPF 50';
    } else {
      spfClass = 'spf-extreme';  spfText = 'SPF 50+';
    }
    if (spfText && days === 1) {
      const spfColors = {'spf-low':'#3aaa55','spf-moderate':'#e8a800','spf-high':'#e06000','spf-veryhigh':'#d02000','spf-extreme':'#9b00c8'};
      const spfColor = spfColors[spfClass] || '#0d1b2a';
      const tip = document.createElement('div');
      tip.className = 'verdict-tip';
      tip.style.setProperty('--accent', spfColor);
      tip.setAttribute('role', 'note');
      tip.setAttribute('aria-label', `Sunscreen tip: ${spfText}`);
      tip.innerHTML = `
        <div class="verdict-tip__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </div>
        <div>
          <div class="verdict-tip__kicker">Sunscreen</div>
          <div class="verdict-tip__text">Recommended: <span class="verdict-tip__accent">${esc(spfText)}</span></div>
        </div>
      `;
      el.querySelector('.verdict').appendChild(tip);
    }
  }

  // Ski wax bubble (Powder mode only)
  if (currentMode === 'snow') {
    const temp = winner.maxTemp;
    let waxClass, waxName;
    if (temp <= -4) {
      waxClass = 'purple'; waxName = 'purple';
    } else if (temp <= 4) {
      waxClass = 'red'; waxName = 'red';
    } else {
      waxClass = 'yellow'; waxName = 'yellow';
    }
    if (days === 1) {
      const waxColors = { purple: '#7b35c1', red: '#e02020', yellow: '#c89000' };
      const waxColor = waxColors[waxClass] || '#0d1b2a';
      const tip = document.createElement('div');
      tip.className = 'verdict-tip';
      tip.style.setProperty('--accent', waxColor);
      tip.setAttribute('role', 'note');
      tip.setAttribute('aria-label', `Wax tip: ${waxName}`);
      tip.innerHTML = `
        <div class="verdict-tip__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m10 20-1.25-2.5L6 18" />
            <path d="M10 4 8.75 6.5 6 6" />
            <path d="m14 20 1.25-2.5L18 18" />
            <path d="m14 4 1.25 2.5L18 6" />
            <path d="m17 21-3-6h-4" />
            <path d="m17 3-3 6 1.5 3" />
            <path d="M2 12h6.5L10 9" />
            <path d="m20 10-1.5 2 1.5 2" />
            <path d="M22 12h-6.5L14 15" />
            <path d="m4 10 1.5 2L4 14" />
            <path d="m7 21 3-6-1.5-3" />
            <path d="m7 3 3 6h4" />
          </svg>
        </div>
        <div>
          <div class="verdict-tip__kicker">Ski wax</div>
          <div class="verdict-tip__text">Use <span class="verdict-tip__accent">${esc(waxName)}</span> wax</div>
        </div>
      `;
      el.querySelector('.verdict').appendChild(tip);
    } // end days===1
  }

  el.style.display = 'block';
}

function setLoading(on) {
  document.getElementById('search-btn').disabled = on;
  document.getElementById('btn-label').style.display = on ? 'none' : 'inline';
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}
function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }
function hideError() { document.getElementById('error').style.display = 'none'; }
document.getElementById('place').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function useMyLocation() {
  if (!navigator.geolocation) { showError('Din webbläsare stöder inte geolokalisering.'); return; }
  const btn = document.getElementById('loc-btn');
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      const { latitude: lat, longitude: lon } = pos.coords;
      const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=sv`);
      const data = await res.json();
      const city = data.city || data.locality || data.principalSubdivision;
      if (!city) throw new Error('Kunde inte identifiera orten för din position.');
      document.getElementById('place').value = city;
      doSearch();
    } catch {
      showError('Kunde inte hämta din position. Försök söka manuellt.');
    } finally {
      btn.disabled = false;
    }
  }, () => {
    showError('Platsåtkomst nekad. Tillåt platsdelning i webbläsarens inställningar.');
    btn.disabled = false;
  }, { timeout: 8000 });
}
document.getElementById('seven-days').addEventListener('change', () => {
  const place = document.getElementById('place').value.trim();
  if (place) {
    document.querySelectorAll('.verdict-tip').forEach(s => s.remove());
    doSearch();
  }
});

function createSnow() {
  if (!document.body.classList.contains('bg-snow')) return;
  const flake = document.createElement('div');
  flake.className = 'snowflake';
  const size = Math.random() * 5 + 2;
  const duration = Math.random() * 6 + 5;
  const delay = Math.random() * 4;
  const left = Math.random() * 100;
  const drift = (Math.random() - 0.5) * 120;
  flake.style.cssText = `width:${size}px;height:${size}px;left:${left}vw;animation-duration:${duration}s;animation-delay:${delay}s;`;
  flake.style.setProperty('--drift', drift + 'px');
  document.body.appendChild(flake);
  setTimeout(() => flake.remove(), (duration + delay) * 1000);
}
let snowInterval = setInterval(createSnow, 180);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(snowInterval);
  } else {
    snowInterval = setInterval(createSnow, 180);
  }
});

</script>
